name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile --network-timeout 600000

      - name: Build app
        run: yarn build:app:docker
        env:
          VITE_APP_GOOGLE_DRIVE: ${{ secrets.VITE_APP_GOOGLE_DRIVE || 'true' }}
          VITE_APP_GOOGLE_CLIENT_ID: ${{ secrets.VITE_APP_GOOGLE_CLIENT_ID }}
          VITE_APP_GOOGLE_API_KEY: ${{ secrets.VITE_APP_GOOGLE_API_KEY }}
          VITE_APP_GOOGLE_DRIVE_FOLDER: ${{ secrets.VITE_APP_GOOGLE_DRIVE_FOLDER || 'diagrams.free' }}
          VITE_APP_DONATE_ENABLED: ${{ secrets.VITE_APP_DONATE_ENABLED || 'false' }}
          VITE_APP_STRIPE_DONATE_ONCE_199: ${{ secrets.VITE_APP_STRIPE_DONATE_ONCE_199 }}
          VITE_APP_STRIPE_DONATE_ONCE_500: ${{ secrets.VITE_APP_STRIPE_DONATE_ONCE_500 }}
          VITE_APP_STRIPE_DONATE_ONCE_1000: ${{ secrets.VITE_APP_STRIPE_DONATE_ONCE_1000 }}
          VITE_APP_STRIPE_DONATE_ONCE_CUSTOM: ${{ secrets.VITE_APP_STRIPE_DONATE_ONCE_CUSTOM }}
          VITE_APP_STRIPE_DONATE_MONTHLY_199: ${{ secrets.VITE_APP_STRIPE_DONATE_MONTHLY_199 }}
          VITE_APP_STRIPE_DONATE_MONTHLY_500: ${{ secrets.VITE_APP_STRIPE_DONATE_MONTHLY_500 }}
          VITE_APP_STRIPE_DONATE_MONTHLY_1000: ${{ secrets.VITE_APP_STRIPE_DONATE_MONTHLY_1000 }}
          VITE_APP_STRIPE_DONATE_MONTHLY_CUSTOM: ${{ secrets.VITE_APP_STRIPE_DONATE_MONTHLY_CUSTOM }}

      - name: Add SPA fallback for deep links
        run: cp excalidraw-app/build/index.html excalidraw-app/build/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: excalidraw-app/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
